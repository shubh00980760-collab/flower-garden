/* ── Watercolour sketch effect on cards ── */
.pc { filter: drop-shadow(0 2px 6px rgba(61,122,79,0.12)); }
.pc:hover { filter: drop-shadow(0 6px 16px rgba(61,122,79,0.22)); }
.pc svg { transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); }
.pc:hover svg { transform: scale(1.08) rotate(-3deg); }
.pc.sel svg  { transform: scale(1.05); }

/* ── Bouquet flower wobble on hover ── */
.bf { transform-origin: bottom center; }
.bf:hover { animation: wobble 0.5s ease; }
@keyframes wobble {
  0%   { transform: rotate(0deg) scale(1.14); }
  25%  { transform: rotate(-8deg) scale(1.14); }
  50%  { transform: rotate(6deg) scale(1.14); }
  75%  { transform: rotate(-4deg) scale(1.14); }
  100% { transform: rotate(0deg) scale(1.14); }
}

/* ── Step dot pulse when active ── */
.step-dot.active { animation: pulse-dot 2s ease-in-out infinite; }
@keyframes pulse-dot {
  0%,100% { box-shadow: 0 0 0 0 rgba(61,122,79,0.4); }
  50%      { box-shadow: 0 0 0 7px rgba(61,122,79,0); }
}

/* ── Button press ripple ── */
.btn-p { position: relative; overflow: hidden; }
.btn-p::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.18);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s ease;
  border-radius: inherit;
}
.btn-p:active::after { transform: scaleX(1); }

/* ── Bouquet box sparkle on add ── */
@keyframes sparkle-in {
  0%   { opacity:0; transform: scale(0) rotate(-25deg); }
  60%  { opacity:1; transform: scale(1.2) rotate(5deg); }
  100% { opacity:1; transform: scale(1) rotate(0deg); }
}
.bf { animation: sparkle-in 0.38s cubic-bezier(0.34,1.56,0.64,1); }

/* ── Received card entrance ── */
.rb { animation: card-rise 0.6s cubic-bezier(0.34,1.2,0.64,1) both; }
@keyframes card-rise {
  from { opacity:0; transform: translateY(30px) scale(0.95); }
  to   { opacity:1; transform: translateY(0)    scale(1); }
}

/* ── Floating flowers on received screen ── */
.rf svg:nth-child(odd)  { animation-delay: 0s;    animation-duration: 3.8s; }
.rf svg:nth-child(even) { animation-delay: 0.6s;  animation-duration: 4.4s; }
.rf svg:nth-child(3n)   { animation-delay: 1.1s;  animation-duration: 3.2s; }

/* ── Gentle page fade-in ── */
.app { animation: fade-in 0.5s ease both; }
@keyframes fade-in { from { opacity:0; } to { opacity:1; } }

/* ── Panel slide transition ── */
.panel.active { animation: slide-up 0.32s cubic-bezier(0.22,1,0.36,1) both; }
@keyframes slide-up {
  from { opacity:0; transform: translateY(14px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── Petal spin variation ── */
.petal:nth-child(odd)  { animation-timing-function: ease-in; }
.petal:nth-child(even) { animation-timing-function: ease-out; }
.petal:nth-child(3n)   { animation-timing-function: linear; }

/* ── Count strip flash when flower added ── */
@keyframes count-flash {
  0%   { background: var(--green); color: #fff; }
  100% { background: var(--tan); color: var(--muted); }
}
.cstrip.flash { animation: count-flash 0.4s ease; }
